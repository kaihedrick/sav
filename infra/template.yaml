AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Bags of Blessings — HTTP API, Lambda, DynamoDB, Google Sign-In (GIS) + app JWT (no Cognito Hosted UI)

Parameters:
  GoogleClientId:
    Type: String
    Description: Google OAuth Web client ID (same as VITE_GOOGLE_CLIENT_ID) — used to verify Google ID tokens
  AdminEmail:
    Type: String
    Description: >
      Admin email(s) for API role and Resend; comma-separated allowed.
      Must match the Google account email (case-insensitive). After changing,
      redeploy and sign out/in so the JWT gets role admin.
  AppBaseUrl:
    Type: String
    Default: http://localhost:5173
    Description: >
      Primary site origin (used for CORS, Resend links, etc.). E.g. https://sav-nu.vercel.app
  ExtraCorsOrigins:
    Type: String
    Default: ""
    Description: >
      Optional comma-separated extra CORS origins (no spaces), e.g. a Vercel preview deployment URL.
  ResendApiKey:
    Type: String
    NoEcho: true
    Default: ""
  GoogleSheetsSpreadsheetId:
    Type: String
    Default: ""
    Description: >
      Optional. Google Sheet ID from the document URL (e.g. 1ml2hBI7knLmdSe7xwblPJM-x_GrGK8PoYAqlQ5r-26Q).
      Share the sheet with the service account email as Editor. Leave empty to disable sync.
  GoogleSheetsSecretArn:
    Type: String
    Default: ""
    Description: >
      Optional. Full Secrets Manager ARN for the Google service account JSON. Use this OR
      GoogleSheetsSecretName (not both required; ARN wins for IAM if set).
  GoogleSheetsSecretName:
    Type: String
    Default: ""
    Description: >
      Optional. Secrets Manager secret name (e.g. sav) whose SecretString is the full Google
      service account JSON. IAM uses a wildcard ARN for this name. Set when you do not pass
      GoogleSheetsSecretArn.
  GoogleSheetsTabName:
    Type: String
    Default: "Inventory Tracker"
    Description: Worksheet tab name where row 1 is headers and data starts at A2.

Conditions:
  HasResend: !Not [!Equals [!Ref ResendApiKey, ""]]
  CorsIncludeLocalDev: !Not [!Equals [!Ref AppBaseUrl, "http://localhost:5173"]]
  HasExtraCorsOrigins: !Not [!Equals [!Ref ExtraCorsOrigins, ""]]
  HasGoogleSheetsSheetId: !Not [!Equals [!Ref GoogleSheetsSpreadsheetId, ""]]
  HasGoogleSheetsSecretArn: !Not [!Equals [!Ref GoogleSheetsSecretArn, ""]]
  HasGoogleSheetsSecretName: !Not [!Equals [!Ref GoogleSheetsSecretName, ""]]
  HasGoogleSheetsSecret: !Or
    - !Condition HasGoogleSheetsSecretArn
    - !Condition HasGoogleSheetsSecretName
  HasGoogleSheets: !And
    - !Condition HasGoogleSheetsSheetId
    - !Condition HasGoogleSheetsSecret

Globals:
  Function:
    Timeout: 29
    MemorySize: 256
    Runtime: nodejs20.x
    Architectures: [x86_64]

Resources:
  AppTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  SessionJwtSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}/session-jwt-hs256"
      Description: HS256 secret for app session JWTs (after Google verifies)
      GenerateSecretString:
        PasswordLength: 64

  ResendSecret:
    Type: AWS::SecretsManager::Secret
    Condition: HasResend
    Properties:
      Name: !Sub "${AWS::StackName}/resend-api-key"
      SecretString: !Sub '{"apiKey":"${ResendApiKey}"}'

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowMethods: [GET, POST, PATCH, DELETE, OPTIONS, HEAD]
        AllowHeaders: [authorization, content-type]
        AllowOrigins: !Split
          - ","
          - !If
            - CorsIncludeLocalDev
            - !If
              - HasExtraCorsOrigins
              - !Sub "${AppBaseUrl},http://localhost:5173,${ExtraCorsOrigins}"
              - !Sub "${AppBaseUrl},http://localhost:5173"
            - !If
              - HasExtraCorsOrigins
              - !Sub "${AppBaseUrl},${ExtraCorsOrigins}"
              - !Ref AppBaseUrl
        MaxAge: 600

  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints: [src/lambda.ts]
        Target: node20
        Format: cjs
        Sourcemap: false
        External:
          - "@aws-sdk/*"
    Properties:
      CodeUri: ../api
      Handler: src/lambda.handler
      Environment:
        Variables:
          TABLE_NAME: !Ref AppTable
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          SESSION_JWT_SECRET_ARN: !Ref SessionJwtSecret
          ADMIN_EMAIL: !Ref AdminEmail
          APP_BASE_URL: !Ref AppBaseUrl
          RESEND_FROM: "Bags of Blessings <onboarding@resend.dev>"
          RESEND_SECRET_ARN: !If [HasResend, !Ref ResendSecret, "none"]
          GOOGLE_SHEETS_SPREADSHEET_ID: !If
            - HasGoogleSheets
            - !Ref GoogleSheetsSpreadsheetId
            - ""
          GOOGLE_SHEETS_SECRET_ARN: !If
            - HasGoogleSheets
            - !If
              - HasGoogleSheetsSecretArn
              - !Ref GoogleSheetsSecretArn
              - !Ref GoogleSheetsSecretName
            - ""
          GOOGLE_SHEETS_TAB_NAME: !Ref GoogleSheetsTabName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AppTable
        - Statement:
            - Effect: Allow
              Action: [secretsmanager:GetSecretValue]
              Resource: !Ref SessionJwtSecret
        - !If
          - HasResend
          - Statement:
              - Effect: Allow
                Action: [secretsmanager:GetSecretValue]
                Resource: !Ref ResendSecret
          - !Ref AWS::NoValue
        - !If
          - HasGoogleSheets
          - Statement:
              - Effect: Allow
                Action: [secretsmanager:GetSecretValue]
                Resource: !If
                  - HasGoogleSheetsSecretArn
                  - !Ref GoogleSheetsSecretArn
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${GoogleSheetsSecretName}-*"
          - !Ref AWS::NoValue
      Events:
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /
            Method: ANY

Outputs:
  HttpApiUrl:
    Value: !Sub "${HttpApi.ApiEndpoint}/"
  PublicInventorySheetHtmlView:
    Condition: HasGoogleSheets
    Description: Same Google Sheet link for everyone (read-only htmlview)
    Value: !Sub "https://docs.google.com/spreadsheets/d/${GoogleSheetsSpreadsheetId}/htmlview"
  TableName:
    Value: !Ref AppTable
  GoogleClientId:
    Description: Paste into web/.env as VITE_GOOGLE_CLIENT_ID
    Value: !Ref GoogleClientId
  SessionJwtSecretArn:
    Description: Auto-generated; Lambda reads this at runtime
    Value: !Ref SessionJwtSecret
